openapi: 3.0.3
info:
  title: IdezBank API
  version: 1.0.0
  description: API mockada para o dashboard da IdezBank.
paths:
  /summary:
    get:
      summary: Obter resumo financeiro
      description: Retorna o saldo total, receitas e despesas com base no mês e ano selecionados.
      parameters:
        - in: query
          name: month
          schema: { type: string }
          description: Mês numérico (ex. 3 para março)
        - in: query
          name: year
          schema: { type: string }
          description: Ano (ex. 2026)
      responses:
        '200':
          description: Resumo retornado com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Summary'

  /available-months:
    get:
      summary: Obter meses com transações
      description: Retorna a lista de meses/anos únicos que possuem transações registradas.
      responses:
        '200':
          description: Lista de meses/anos retornada com sucesso.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AvailableMonth'

  /transactions:
    get:
      summary: Listar transações
      description: Retorna a lista de transações com suporte a paginação, filtros, busca e ordenação.
      parameters:
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 10 }
        - in: query
          name: type
          schema: { type: string, enum: [income, expense] }
        - in: query
          name: search
          schema: { type: string }
          description: Busca por descrição
        - in: query
          name: startDate
          schema: { type: string, format: date }
        - in: query
          name: endDate
          schema: { type: string, format: date }
        - in: query
          name: minAmount
          schema: { type: number }
        - in: query
          name: maxAmount
          schema: { type: number }
        - in: query
          name: sortBy
          schema: { type: string, enum: [date, amount] }
        - in: query
          name: sortOrder
          schema: { type: string, enum: [asc, desc], default: desc }
      responses:
        '200':
          description: Lista de transações paginada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedTransactions'
    post:
      summary: Criar nova transação
      description: Cadastra uma nova entrada ou saída financeira.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewTransaction'
      responses:
        '201':
          description: Transação criada com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Transaction'

components:
  schemas:
    Summary:
      type: object
      properties:
        totalBalance: { type: number, example: 15450.00 }
        totalIncome: { type: number, example: 20000.00 }
        totalExpense: { type: number, example: 4550.00 }
    
    AvailableMonth:
      type: object
      properties:
        year: { type: integer, example: 2026 }
        month: { type: integer, example: 3 }
    
    Transaction:
      type: object
      properties:
        id: { type: string, format: uuid }
        type: { type: string, enum: [income, expense] }
        amount: { type: number }
        date: { type: string, format: date-time }
        category: { type: string }
        description: { type: string }
        
    NewTransaction:
      type: object
      required: [type, amount, date, category, description]
      properties:
        type: { type: string, enum: [income, expense] }
        amount: { type: number }
        date: { type: string, format: date-time }
        category: { type: string }
        description: { type: string }

    PaginatedTransactions:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Transaction'
        meta:
          type: object
          properties:
            totalCount: { type: integer }
            currentPage: { type: integer }
            totalPages: { type: integer }
            